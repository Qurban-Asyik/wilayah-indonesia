services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DB_PROVIDER=${DB_PROVIDER}
    ports:
      - "${APP_PORT:-9206}:9206"
    # depends_on:
    #   - db
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 1
      start_period: 30s # Give more time for migration and seeding

